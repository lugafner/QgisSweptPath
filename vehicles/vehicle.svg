<svg 
    width="150"
    height="25" 
    viewBox="0 0 150 25"
    xmlns="http://www.w3.org/2000/svg">
      
    <style>
        .body {
            stroke-width: 1;
            stroke: black;
            fill: white;
        }
        .wheel {
            fill: black;
        }
    </style>

    <g>
    <!-- vehicle body (origin top left)-->
    <rect 
        class="body"
        x="0.5"
        y="0.5"
        width="149"
        height="24"
        rx="1"
    />
    </g>

    <g transform="translate(119 5.512)">
    <!-- left front wheel (origin left pivot) -->
    <rect 
        id="left_wheel"
        class="wheel"
        x="-4.875"
        y="-5.512"
        width="9.75"
        height="2.74"
        rx="1"
        transform="param(wheel_angle)"
    />
    <circle
        id="left_pivot"
        cx="0"
        cy="0"
        r="0.5"
        fill="black"
    />
    </g>

    <g transform="translate(119 19.488)">
    <!-- right front wheel (origin right pivot)-->
    <rect
        id="right_wheel" 
        class="wheel"
        x="-4.875"
        y="2.772"
        width="9.75"
        height="2.74"
        rx="1"
        transform="param(wheel_angle)"
    />
    <circle
        id="right_pivot"
        cx="0"
        cy="0"
        r="0.5"
        fill="black"
    />
    </g>
</svg>